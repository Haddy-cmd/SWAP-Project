; OPcache tuning for the SWAP API (production).
;
; IMPORTANT: enable_cli=1 is required because the container serves HTTP via
; `php artisan serve` (the CLI SAPI). With only opcache.enable=1, OPcache would
; have NO effect on the running server — that flag targets php-fpm/web SAPIs.
opcache.enable=1
opcache.enable_cli=1

; Sizing. memory_consumption is the bytecode cache; interned_strings dedupes
; strings; max_accelerated_files must exceed the number of PHP files in the app
; (Laravel + vendor is a few thousand — 10000 leaves headroom).
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000

; The container image is immutable and rebuilt on every deploy, so the cache is
; always fresh on boot. We can therefore skip per-request file-timestamp checks
; for maximum throughput. (If you ever switch to mutating code in a live
; container, set this back to 1 or run `opcache_reset()` after changes.)
opcache.validate_timestamps=0

; Tracing JIT. Modest gains for an IO-bound web app, but free to enable.
opcache.jit=tracing
opcache.jit_buffer_size=64M
