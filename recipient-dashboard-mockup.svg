<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="maroon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8E1B1B"/>
      <stop offset="0.6" stop-color="#5C1010"/>
      <stop offset="1" stop-color="#7A1717"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E6C66A"/>
      <stop offset="1" stop-color="#B8901F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D8B65A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D8B65A" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#5C1010" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1180" height="720" fill="#FAF7F7"/>

  <!-- ===================== HERO ===================== -->
  <g filter="url(#soft)"><rect x="24" y="24" width="1132" height="176" rx="22" fill="url(#maroon)"/></g>
  <circle cx="1040" cy="40" r="150" fill="url(#glow)"/>

  <!-- avatar -->
  <circle cx="78" cy="86" r="28" fill="url(#gold)"/>
  <text x="78" y="95" font-size="24" font-weight="800" fill="#531010" text-anchor="middle">N</text>

  <text x="122" y="74" font-size="12" letter-spacing="2.5" fill="#E6C66A">WELCOME BACK</text>
  <text x="122" y="104" font-size="26" font-weight="800" fill="#FFFFFF">Norhana Macarimbang</text>

  <!-- assignment line -->
  <g transform="translate(122,134)">
    <rect x="0" y="0" width="20" height="20" rx="5" fill="#FFFFFF" fill-opacity="0.14"/>
    <rect x="5" y="5" width="10" height="10" fill="#E6C66A"/>
    <text x="30" y="15" font-size="14" font-weight="600" fill="#FFFFFF">Information Technology Center</text>
    <circle cx="312" cy="10" r="1.6" fill="#FFFFFF" fill-opacity="0.5"/>
    <text x="328" y="15" font-size="13" fill="#FFFFFF" fill-opacity="0.7">Technology Building</text>
    <circle cx="490" cy="10" r="1.6" fill="#FFFFFF" fill-opacity="0.5"/>
    <text x="506" y="15" font-size="13" fill="#FFFFFF" fill-opacity="0.7">Prof. Sittie Hadja</text>
  </g>

  <!-- hero right: status + clock-in CTA -->
  <rect x="812" y="52" width="150" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.12"/>
  <circle cx="832" cy="67" r="4" fill="#9CA3AF"/>
  <text x="844" y="71" font-size="12.5" fill="#FFFFFF" fill-opacity="0.9">Not clocked in</text>

  <text x="1132" y="71" font-size="12.5" fill="#FFFFFF" fill-opacity="0.6" text-anchor="end">2024–2025 · 1st Semester · 120h required</text>

  <g filter="url(#soft)"><rect x="812" y="100" width="320" height="56" rx="14" fill="url(#gold)"/></g>
  <!-- clock icon -->
  <circle cx="846" cy="128" r="11" fill="none" stroke="#531010" stroke-width="2"/>
  <path d="M846 122 v6 l4 3" stroke="#531010" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="972" y="134" font-size="16" font-weight="800" fill="#531010" text-anchor="middle">Clock In  →</text>

  <!-- ===================== PROGRESS CARD ===================== -->
  <g filter="url(#soft)"><rect x="24" y="224" width="700" height="472" rx="22" fill="#FFFFFF"/></g>
  <text x="52" y="266" font-size="17" font-weight="700" fill="#1E293B">Service Hours Progress</text>
  <text x="52" y="288" font-size="12.5" fill="#8A6A6A">This semester · Information Technology Center</text>

  <!-- donut -->
  <g transform="translate(192,430)">
    <circle r="82" fill="none" stroke="#EFE7E7" stroke-width="20"/>
    <!-- verified 2.5% -->
    <circle r="82" fill="none" stroke="#27AE60" stroke-width="20" stroke-linecap="round"
      stroke-dasharray="12.9 502" transform="rotate(-90)"/>
    <!-- pending ~0.8% -->
    <circle r="82" fill="none" stroke="#F39C12" stroke-width="20" stroke-linecap="round"
      stroke-dasharray="4.3 510" stroke-dashoffset="-14" transform="rotate(-90)"/>
    <text x="0" y="-2" font-size="34" font-weight="800" fill="#1E293B" text-anchor="middle">3h</text>
    <text x="0" y="20" font-size="13" fill="#8A6A6A" text-anchor="middle">of 120h</text>
    <rect x="-26" y="34" width="52" height="22" rx="11" fill="#FEF0F0"/>
    <text x="0" y="49" font-size="12" font-weight="700" fill="#7D1A1A" text-anchor="middle">2.5%</text>
  </g>

  <!-- legend -->
  <g transform="translate(360,358)">
    <circle cx="8" cy="8" r="7" fill="#27AE60"/>
    <text x="28" y="6" font-size="12.5" fill="#8A6A6A">Verified Hours</text>
    <text x="28" y="28" font-size="22" font-weight="800" fill="#1E293B">3h</text>

    <circle cx="8" cy="78" r="7" fill="#F39C12"/>
    <text x="28" y="76" font-size="12.5" fill="#8A6A6A">Pending Verification</text>
    <text x="28" y="98" font-size="22" font-weight="800" fill="#1E293B">1h</text>

    <circle cx="8" cy="148" r="7" fill="#CBB8B8"/>
    <text x="28" y="146" font-size="12.5" fill="#8A6A6A">Remaining Needed</text>
    <text x="28" y="168" font-size="22" font-weight="800" fill="#7D1A1A">117h</text>
  </g>

  <!-- thin overall bar -->
  <text x="52" y="600" font-size="12.5" fill="#8A6A6A">Overall completion</text>
  <text x="672" y="600" font-size="12.5" font-weight="700" fill="#27AE60" text-anchor="end">2.5%</text>
  <rect x="52" y="612" width="620" height="12" rx="6" fill="#EFE7E7"/>
  <rect x="52" y="612" width="20" height="12" rx="6" fill="#27AE60"/>

  <!-- ===================== QUICK ACTIONS ===================== -->
  <g filter="url(#soft)"><rect x="748" y="224" width="408" height="472" rx="22" fill="#FFFFFF"/></g>
  <text x="776" y="266" font-size="17" font-weight="700" fill="#1E293B">Quick Actions</text>

  <!-- card template helper drawn inline -->
  <!-- row 1 -->
  <g transform="translate(776,290)">
    <rect width="172" height="118" rx="16" fill="#FAF7F7" stroke="#EFE3E3"/>
    <rect x="16" y="16" width="40" height="40" rx="11" fill="#FEF0F0"/>
    <circle cx="36" cy="36" r="9" fill="none" stroke="#7D1A1A" stroke-width="2"/>
    <path d="M36 31 v5 l3 3" stroke="#7D1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="16" y="84" font-size="14.5" font-weight="700" fill="#1E293B">Time In / Out</text>
    <text x="16" y="103" font-size="11.5" fill="#8A6A6A">Scan your QR code</text>
  </g>
  <g transform="translate(964,290)">
    <rect width="172" height="118" rx="16" fill="#FAF7F7" stroke="#EFE3E3"/>
    <rect x="16" y="16" width="40" height="40" rx="11" fill="#FEF0F0"/>
    <path d="M27 44 l6 -7 l5 4 l8 -10" stroke="#7D1A1A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="16" y="84" font-size="14.5" font-weight="700" fill="#1E293B">My Hours</text>
    <text x="16" y="103" font-size="11.5" fill="#8A6A6A">View all logs</text>
  </g>
  <!-- row 2 -->
  <g transform="translate(776,430)">
    <rect width="172" height="118" rx="16" fill="#FAF7F7" stroke="#EFE3E3"/>
    <rect x="16" y="16" width="40" height="40" rx="11" fill="#FEF0F0"/>
    <rect x="29" y="26" width="14" height="18" rx="2" fill="none" stroke="#7D1A1A" stroke-width="2"/>
    <path d="M32 31 h8 M32 35 h8" stroke="#7D1A1A" stroke-width="1.4"/>
    <text x="16" y="84" font-size="14.5" font-weight="700" fill="#1E293B">Reports</text>
    <text x="16" y="103" font-size="11.5" fill="#8A6A6A">Weekly · monthly</text>
  </g>
  <g transform="translate(964,430)">
    <rect width="172" height="118" rx="16" fill="#FAF7F7" stroke="#EFE3E3"/>
    <rect x="16" y="16" width="40" height="40" rx="11" fill="#FEF0F0"/>
    <text x="36" y="42" font-size="18" font-weight="800" fill="#7D1A1A" text-anchor="middle">₱</text>
    <text x="16" y="84" font-size="14.5" font-weight="700" fill="#1E293B">Stipend</text>
    <text x="16" y="103" font-size="11.5" fill="#8A6A6A">Disbursement history</text>
  </g>

  <!-- helpful tip strip -->
  <g transform="translate(776,572)">
    <rect width="360" height="100" rx="16" fill="#FFFBEB" stroke="#F3E2B8"/>
    <circle cx="32" cy="34" r="14" fill="#FEF3C7"/>
    <text x="32" y="39" font-size="15" text-anchor="middle">💡</text>
    <text x="58" y="32" font-size="13" font-weight="700" fill="#92400E">Next step</text>
    <text x="58" y="54" font-size="12" fill="#92400E" fill-opacity="0.85">You have 117h to go. Head to your office</text>
    <text x="58" y="72" font-size="12" fill="#92400E" fill-opacity="0.85">and clock in to start earning hours.</text>
  </g>
</svg>
